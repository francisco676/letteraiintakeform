<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RallyUp — Letter AI Content Onboarding</title>
<style>
  @import url('https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,800,900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --primary: #7f56d9;
    --accent-1: #6941c6;
    --accent-2: #b692f6;
    --dark: #14101f;
    --card: #1d1730;
    --border: rgba(255,255,255,0.10);
    --gray: #9b93ad;
    --white: #f3f0fa;
    --radius: 14px;
  }
  body {
    font-family: 'Satoshi', -apple-system, sans-serif;
    background: var(--dark);
    color: var(--white);
    min-height: 100vh;
    line-height: 1.6;
  }

  .header {
    padding: 32px 24px 0;
    max-width: 640px;
    margin: 0 auto;
    text-align: center;
  }
  .logo-row {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; margin-bottom: 20px;
  }
  .logo-ru {
    width: 48px; height: 48px;
    background: linear-gradient(180deg, var(--primary), var(--accent-1));
    border-radius: var(--radius);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .logo-ru svg { width: 26px; height: 26px; }
  .logo-x {
    font-size: 16px; color: rgba(255,255,255,0.30); font-weight: 500;
  }
  .logo-brand {
    height: 48px; width: 48px;
    border-radius: var(--radius);
    overflow: hidden; background: #fff;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .logo-brand img { height: 100%; width: 100%; object-fit: cover; display: block; }
  .header h1 { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
  .header p { color: var(--gray); font-size: 15px; max-width: 480px; margin: 0 auto 8px; }
  .time-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(182,146,246,0.10); border: 1px solid rgba(182,146,246,0.30);
    color: var(--accent-2); font-size: 13px; font-weight: 600;
    padding: 6px 16px; border-radius: 50px; margin-top: 12px;
  }

  .progress-wrap { max-width: 640px; margin: 28px auto 0; padding: 0 24px; }
  .progress-bar {
    height: 4px; background: rgba(255,255,255,0.06);
    border-radius: 4px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--primary), var(--accent-2));
    border-radius: 4px; transition: width 0.5s cubic-bezier(0.22,1,0.36,1);
  }
  .progress-label {
    display: flex; justify-content: space-between; margin-top: 8px;
    font-size: 12px; color: var(--gray); font-weight: 500;
  }

  .container { max-width: 640px; margin: 0 auto; padding: 24px 24px 120px; }

  .section { display: none; animation: fadeIn 0.4s ease; }
  .section.active { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .section-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--primary); margin-bottom: 8px;
  }
  .block-label {
    display: inline-block;
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.2px; color: var(--accent-2);
    background: rgba(182,146,246,0.08);
    border: 1px solid rgba(182,146,246,0.25);
    padding: 4px 10px; border-radius: 50px;
    margin-bottom: 14px;
  }
  .section-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .section-title em { font-style: italic; color: var(--accent-2); }
  .section-desc { font-size: 14px; color: var(--gray); margin-bottom: 28px; }

  .question { margin-bottom: 28px; }
  .q-label {
    font-size: 15px; font-weight: 600; margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .q-hint { font-size: 13px; color: var(--gray); margin-bottom: 10px; }

  textarea, input[type="text"], input[type="email"] {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px; color: var(--white);
    font-family: inherit; font-size: 15px; resize: vertical;
    transition: border-color 0.2s; outline: none;
  }
  textarea:focus, input[type="text"]:focus, input[type="email"]:focus {
    border-color: rgba(127,86,217,0.55);
  }
  textarea { min-height: 88px; }
  textarea.tall { min-height: 140px; }
  textarea.x-tall { min-height: 220px; }

  .radio-group { display: flex; flex-direction: column; gap: 8px; }
  .radio-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px 14px; background: var(--card);
    border: 1px solid var(--border); border-radius: 12px;
    cursor: pointer; transition: all 0.2s;
  }
  .radio-row:hover { border-color: rgba(127,86,217,0.45); background: rgba(127,86,217,0.06); }
  .radio-row.selected {
    background: rgba(127,86,217,0.12); border-color: var(--primary);
  }
  .radio-row input[type="radio"] {
    margin-top: 4px; accent-color: var(--primary);
  }
  .radio-row .rl { font-size: 14px; font-weight: 500; }
  .radio-row .rl strong { font-weight: 700; }

  .inline-text { margin-top: 10px; display: none; }
  .inline-text.show { display: block; }

  .nav-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(20,16,31,0.92); backdrop-filter: blur(16px);
    border-top: 1px solid var(--border); padding: 16px 24px;
    display: flex; justify-content: space-between; align-items: center;
    max-width: 640px; margin: 0 auto;
    z-index: 100;
  }
  @media(min-width:641px) {
    .nav-bar { left: 50%; transform: translateX(-50%); border-radius: 20px 20px 0 0; }
  }
  .btn {
    padding: 12px 28px; border-radius: 12px; font-size: 15px;
    font-weight: 600; cursor: pointer; border: none;
    font-family: inherit; transition: all 0.2s;
  }
  .btn-ghost { background: transparent; color: var(--gray); }
  .btn-ghost:hover { color: var(--white); }
  .btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--accent-1));
    color: white;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-submit {
    background: linear-gradient(135deg, var(--primary), var(--accent-2));
    color: white;
  }
  .btn:disabled { opacity: 0.4; cursor: default; transform: none; }

  .welcome { text-align: center; padding: 40px 0 0; }
  .welcome h2 { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
  .welcome p { color: var(--gray); font-size: 16px; max-width: 460px; margin: 0 auto 32px; line-height: 1.65; }
  .welcome-cards {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    text-align: left; margin-bottom: 32px;
  }
  .wc {
    padding: 16px; background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .wc h4 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .wc p { font-size: 12px; color: var(--gray); margin: 0; }

  .done { text-align: center; padding: 60px 0; }
  .done .logo-brand {
    width: 64px; height: 64px; margin-bottom: 20px;
    border-radius: var(--radius);
  }
  .done h2 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
  .done p { color: var(--gray); font-size: 16px; max-width: 420px; margin: 0 auto; line-height: 1.6; }

  @media(max-width:480px) {
    .welcome-cards { grid-template-columns: 1fr; }
    .header h1 { font-size: 22px; }
    .section-title { font-size: 20px; }
  }
</style>
</head>
<body>

<!-- Token gate runs FIRST. Local file preview bypasses; deployed https requires the token. -->
<script>
  (function () {
    var REQUIRED_TOKEN = '29fd2500';
    var urlParams = new URLSearchParams(window.location.search);
    var providedToken = urlParams.get('key');
    var isLocalPreview = (window.location.protocol === 'file:');
    if (!isLocalPreview && providedToken !== REQUIRED_TOKEN) {
      document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#888;font-family:system-ui,sans-serif;">This link is invalid or has expired. Please contact your RallyUp partner.</div>';
      throw new Error('invalid_token');
    }
  })();
</script>

<div class="header">
  <div class="logo-row">
    <div class="logo-ru">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/></svg>
    </div>
    <span class="logo-x">x</span>
    <div class="logo-brand"><img src="assets/favicon.png" alt="Letter AI"></div>
  </div>
  <h1>Executive Content Onboarding</h1>
  <p>A few quick questions so we can write content that actually sounds like you.</p>
  <div class="time-badge">About 10 minutes &middot; 3 blocks</div>
</div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label">
    <span id="sectionLabel">Welcome</span>
    <span id="progressPct">0%</span>
  </div>
</div>

<div class="container" id="app"></div>

<div class="nav-bar">
  <button class="btn btn-ghost" id="btnBack" onclick="goBack()">Back</button>
  <button class="btn btn-primary" id="btnNext" onclick="goNext()">Get Started</button>
</div>

<script>
  // ============================================================
  // Session + Apps Script wiring
  // ============================================================
  var SESSION_ID = (Date.now().toString(36) + Math.random().toString(36).substr(2, 9));
  var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwXZa4DxBSRhMkYmGG6ohRi-IAAdMM1VFXmQ-r--OFGpLh-wuzr7mVHrjNZ7WYrIoMwjA/exec';
  var state = {};

  function sendEvent(event, fields) {
    Object.assign(state, fields || {});
    state.event = event;
    state.session_id = SESSION_ID;
    state.timestamp = new Date().toISOString();
    try {
      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(state),
        redirect: 'follow'
      });
    } catch (e) { /* network noise — swallow */ }
  }

  // ============================================================
  // Sections — 10 questions across 3 blocks
  //   Block A · Voice & Audience       → Q1, Q2
  //   Block B · The Framework + Origin → Q3, Q4
  //   Block C · Filling the Gaps       → Q5–Q10
  // ============================================================
  var sections = [
    // 0: Welcome
    { id: 'welcome', label: 'Welcome', type: 'welcome', render: function () {
      return ''
        + '<div class="welcome">'
        + '  <h2>Hey Ali</h2>'
        + '  <p>Your posts, your profile, and Letter AI\'s brand already gave us most of your voice. What posts can\'t reach: the framework you\'ve been applying since Samsara and never named, the credentials you haven\'t surfaced yet, and the founder stories that aren\'t on LinkedIn. Answer fast - first draft, no edits.</p>'
        + '  <div class="welcome-cards">'
        + '    <div class="wc"><h4>10 short questions</h4><p>3 blocks: voice, framework, gaps</p></div>'
        + '    <div class="wc"><h4>About 10 minutes</h4><p>Coffee-length</p></div>'
        + '    <div class="wc"><h4>No wrong answers</h4><p>First instinct wins</p></div>'
        + '    <div class="wc"><h4>Stays between us</h4><p>Only your content team sees it</p></div>'
        + '  </div>'
        + '</div>';
    }},

    // ─── BLOCK A · Voice & Audience ───────────────────────────────

    // 1: Q1 — Audience (open)
    { id: 'q1', label: 'Voice & Audience', type: 'question', qNum: 1, qKey: 'q1', render: function () {
      return ''
        + '<div class="block-label">Block A · Voice &amp; Audience</div>'
        + '<div class="section-label">Question 1 of 10</div>'
        + '<div class="section-title">Who do you want to reach on LinkedIn?</div>'
        + '<div class="section-desc">Not your whole market - the one person you\'re most glad saw a great post of yours.</div>'
        + '<div class="question">'
        + '  <div class="q-label">Describe them in your own words.</div>'
        + '  <div class="q-hint">Name, role, company are perfect. Or: "a VP of Revenue Enablement at a 3,000-person software company who\'s drowning in stale content and skeptical that AI enablement is more than a GPT wrapper." The more specific the better.</div>'
        + '  <textarea class="tall" data-key="q1" placeholder="The person I\'m most glad saw the post is..."></textarea>'
        + '</div>';
    }},

    // 2: Q2 — How do you want them to see YOU? (radio + Other)
    { id: 'q2', label: 'Voice & Audience', type: 'question', qNum: 2, qKey: 'q2', render: function () {
      return ''
        + '<div class="block-label">Block A · Voice &amp; Audience</div>'
        + '<div class="section-label">Question 2 of 10</div>'
        + '<div class="section-title">How do you want them to see <em>you</em>?</div>'
        + '<div class="section-desc">When a customer or peer describes you to someone else, what\'s the line you want them to use? Pick the closest or write your own.</div>'
        + '<div class="question">'
        + '  <div class="q-label">Choose the closest framing.</div>'
        + '  <div class="radio-group" data-key="q2">'
        + '    <label class="radio-row"><input type="radio" name="q2" value="The customer-first operator CEO"><span class="rl"><strong>The customer-first operator CEO</strong> →credibility from shipped systems and customer wins, not slogans</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q2" value="The builder who ships real-world AI"><span class="rl"><strong>The builder who ships real-world AI</strong> →Samsara edge-AI safety + patents; the opposite of a GPT-wrapper founder</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q2" value="The strategist-turned-operator"><span class="rl"><strong>The strategist-turned-operator</strong> →McKinsey "Distinctive" → built ML teams → GM → founder</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q2" value="The enablement category re-thinker"><span class="rl"><strong>The enablement category re-thinker</strong> →the person redefining enablement from passive to active in the AI era</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q2" value="Other"><span class="rl"><strong>Other</strong> →write your own framing</span></label>'
        + '  </div>'
        + '  <div class="inline-text" data-reveal-for="Other">'
        + '    <textarea data-key="q2_other" placeholder="How do you want to be seen, in your own words?"></textarea>'
        + '  </div>'
        + '</div>';
    }},

    // ─── BLOCK B · The Framework + Origin ─────────────────────────

    // 3: Q3 — Name the framework (radio + write-in)
    { id: 'q3', label: 'The Framework', type: 'question', qNum: 3, qKey: 'q3', render: function () {
      return ''
        + '<div class="block-label">Block B · The Framework + Origin</div>'
        + '<div class="section-label">Question 3 of 10</div>'
        + '<div class="section-title">Name the framework.</div>'
        + '<div class="section-desc">You borrow "make something people want" (YC) and "never sell alone" (the Letter brand line), but you don\'t yet have a test that\'s yours. A named framework with your name on it is what gets reshared - and it unlocks deeper founder-thesis posts.</div>'
        + '<div class="question">'
        + '  <div class="q-label">What\'s the one question you ask most when you evaluate a new Letter feature or roadmap call?</div>'
        + '  <div class="radio-group" data-key="q3">'
        + '    <label class="radio-row"><input type="radio" name="q3" value="The Passive-to-Active test"><span class="rl"><strong>The Passive-to-Active test</strong> →does this turn passive content into active, in-the-moment value for the rep?</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q3" value="Does the seller look smarter?"><span class="rl"><strong>"Does the seller look smarter?"</strong> →every feature has to make the rep more credible in front of the buyer</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q3" value="Make something people want"><span class="rl"><strong>Make something people want</strong> →the YC adage, but made into your own operating test</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q3" value="I have my own name for it"><span class="rl"><strong>I have my own name for it</strong> →write it below</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q3" value="Haven\'t named it yet"><span class="rl"><strong>Haven\'t named it yet - let\'s pick one together</strong> →drop candidates in the box</span></label>'
        + '  </div>'
        + '  <div class="inline-text" data-reveal-for="I have my own name for it">'
        + '    <textarea data-key="q3_other" placeholder="Your name for it - and a one-line definition + its 2-3 inputs if you have them."></textarea>'
        + '  </div>'
        + '  <div class="inline-text" data-reveal-for="Haven\'t named it yet">'
        + '    <textarea data-key="q3_other" placeholder="Candidate names - even half-formed ones. We\'ll workshop it from here."></textarea>'
        + '  </div>'
        + '</div>';
    }},

    // 4: Q4 — The Letter founding moment (open, tall)
    { id: 'q4', label: 'The Framework', type: 'question', qNum: 4, qKey: 'q4', render: function () {
      return ''
        + '<div class="block-label">Block B · The Framework + Origin</div>'
        + '<div class="section-label">Question 4 of 10</div>'
        + '<div class="section-title">The Letter founding moment.</div>'
        + '<div class="section-desc">You tell a Samsara-era story externally - sellers pinging engineers because legacy enablement failed them - but it\'s never appeared on your LinkedIn. This is the prequel to the company.</div>'
        + '<div class="question">'
        + '  <div class="q-label">Walk me through the specific moment at Samsara or project44 when you realized enablement was broken enough that you had to leave and build Letter. Who was the seller? What was the question they couldn\'t answer? What did you do that day?</div>'
        + '  <div class="q-hint">The room, the person, what was said, what you almost did instead. First-draft is fine.</div>'
        + '  <textarea class="tall" data-key="q4" placeholder="The moment it clicked was..."></textarea>'
        + '</div>';
    }},

    // ─── BLOCK C · Filling the Gaps ───────────────────────────────

    // 5: Q5 — Underused credential + the lesson (open, tall)
    { id: 'q5', label: 'Filling the Gaps', type: 'question', qNum: 5, qKey: 'q5', render: function () {
      return ''
        + '<div class="block-label">Block C · Filling the Gaps</div>'
        + '<div class="section-label">Question 5 of 10</div>'
        + '<div class="section-title">The credential you\'d actually surface.</div>'
        + '<div class="section-desc">Four of your credentials never show up in your posts - and each one quietly counters the 2026 "is this just a GPT wrapper?" skepticism with a real-world track record.</div>'
        + '<div class="question">'
        + '  <div class="q-label">Pick one and give me the lesson you\'d hang on it.</div>'
        + '  <div class="q-hint">Candidates: (a) Samsara edge-AI / your safety patent, (b) McKinsey "Distinctive" (top 5%), (c) the Obama 2012 Dashboard (358k events organized), or (d) Chicago roots - Northside Prep to full-tuition U Chicago. Which one are you comfortable building a post around, and what\'s the one lesson it taught you?</div>'
        + '  <textarea class="tall" data-key="q5" placeholder="The one I\'d surface is... and the lesson is..."></textarea>'
        + '</div>';
    }},

    // 6: Q6 — How personal you'll go (radio + Other)
    { id: 'q6', label: 'Filling the Gaps', type: 'question', qNum: 6, qKey: 'q6', render: function () {
      return ''
        + '<div class="block-label">Block C · Filling the Gaps</div>'
        + '<div class="section-label">Question 6 of 10</div>'
        + '<div class="section-title">How personal will you go?</div>'
        + '<div class="section-desc">Your highest-performing post ever (373 reactions) was the "two little monsters" personal note. The personal track clearly works for your audience - but it\'s only happened once.</div>'
        + '<div class="question">'
        + '  <div class="q-label">Which personal anchor are you most comfortable leaning into for 1-2 posts a year?</div>'
        + '  <div class="radio-group" data-key="q6">'
        + '    <label class="radio-row"><input type="radio" name="q6" value="Parenting / family"><span class="rl"><strong>Parenting / family</strong> →the "two little monsters", Slack-on-do-not-disturb register</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q6" value="Chicago / first-gen"><span class="rl"><strong>Chicago / first-gen</strong> →Northside Prep → full-tuition U Chicago scholar story</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q6" value="Career pivot"><span class="rl"><strong>A career-pivot moment</strong> →leaving McKinsey / the decision to operate instead of advise</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q6" value="The leap to founding"><span class="rl"><strong>The leap to founding Letter</strong> →leaving a GM seat at project44 to start from zero</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q6" value="Something else"><span class="rl"><strong>Something else</strong> →describe below</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q6" value="None"><span class="rl"><strong>None - keep it customer-first only</strong> →skip the personal track</span></label>'
        + '  </div>'
        + '  <div class="inline-text" data-reveal-for="Something else">'
        + '    <textarea data-key="q6_other" placeholder="What personal anchor would you use?"></textarea>'
        + '  </div>'
        + '</div>';
    }},

    // 7: Q7 — A recurring series (radio + Other)
    { id: 'q7', label: 'Filling the Gaps', type: 'question', qNum: 7, qKey: 'q7', render: function () {
      return ''
        + '<div class="block-label">Block C · Filling the Gaps</div>'
        + '<div class="section-label">Question 7 of 10</div>'
        + '<div class="section-title">A series you\'d commit to.</div>'
        + '<div class="section-desc">Series compound - each entry references the last. Right now every post stands alone. Two natural candidates already have a seed in your corpus.</div>'
        + '<div class="question">'
        + '  <div class="q-label">Would you commit to one recurring series? Pick what feels sustainable.</div>'
        + '  <div class="radio-group" data-key="q7">'
        + '    <label class="radio-row"><input type="radio" name="q7" value="From the Field"><span class="rl"><strong>"From the Field"</strong> →customer on-site recaps (the Lenovo Morrisville visit was the seed)</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q7" value="Year of Building"><span class="rl"><strong>"Year of Building"</strong> →quarterly milestone roundups (the Year-in-Review was the seed)</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q7" value="Both"><span class="rl"><strong>Both</strong> →I\'d sustain both</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q7" value="Other"><span class="rl"><strong>Something else / not right now</strong> →describe below</span></label>'
        + '  </div>'
        + '  <div class="inline-text" data-reveal-for="Other">'
        + '    <textarea data-key="q7_other" placeholder="A different series idea, or why now isn\'t the time."></textarea>'
        + '  </div>'
        + '</div>';
    }},

    // 8: Q8 — Who you learn from (open)
    { id: 'q8', label: 'Filling the Gaps', type: 'question', qNum: 8, qKey: 'q8', render: function () {
      return ''
        + '<div class="block-label">Block C · Filling the Gaps</div>'
        + '<div class="section-label">Question 8 of 10</div>'
        + '<div class="section-title">Who you learn from.</div>'
        + '<div class="section-desc">Your posts name customers and teammates, but no thinkers or operators you actually learn from. That gap shapes both what you write next and who you could be in conversation with.</div>'
        + '<div class="question">'
        + '  <div class="q-label">Name 3-5 founders, operators, or category voices on LinkedIn whose posts you actually read end to end. Why those specific people?</div>'
        + '  <div class="q-hint">LinkedIn URLs are perfect. Mark Roberge is on your board - fair game if you learn from him. Substack writers and podcast hosts count too. "Learn from," not just "respect."</div>'
        + '  <textarea data-key="q8" placeholder="The ones I actually learn from..."></textarea>'
        + '</div>';
    }},

    // 9: Q9 — "Never sell alone" brand vision (radio validation + Changed)
    { id: 'q9', label: 'Filling the Gaps', type: 'question', qNum: 9, qKey: 'q9', render: function () {
      return ''
        + '<div class="block-label">Block C · Filling the Gaps</div>'
        + '<div class="section-label">Question 9 of 10</div>'
        + '<div class="section-title">"Never sell alone" - still the line?</div>'
        + '<div class="section-desc">It\'s documented as Letter\'s brand vision phrase, but it hasn\'t appeared in your posts yet. If it\'s still active, it becomes a signature line for your founder-thesis posts.</div>'
        + '<div class="question">'
        + '  <div class="q-label">Is "Never sell alone" still the active brand line you use internally and externally?</div>'
        + '  <div class="radio-group" data-key="q9">'
        + '    <label class="radio-row"><input type="radio" name="q9" value="Still active"><span class="rl"><strong>Still active</strong> →use it as a signature line</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q9" value="Changed"><span class="rl"><strong>Changed</strong> →describe the current line below</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q9" value="Not sure"><span class="rl"><strong>Not sure</strong> →let\'s leave it out for now</span></label>'
        + '  </div>'
        + '  <div class="inline-text" data-reveal-for="Changed">'
        + '    <textarea data-key="q9_other" placeholder="What\'s the current brand line?"></textarea>'
        + '  </div>'
        + '</div>';
    }},

    // 10: Q10 — Career-timeline color (open, x-tall)
    { id: 'q10', label: 'Filling the Gaps', type: 'question', qNum: 10, qKey: 'q10', render: function () {
      return ''
        + '<div class="block-label">Block C · Filling the Gaps</div>'
        + '<div class="section-label">Question 10 of 10</div>'
        + '<div class="section-title">Career-timeline color details.</div>'
        + '<div class="section-desc">We want to write a year-by-year career post in your voice (think: "2012: built the Dashboard that organized 358,000 Obama campaign events. 2020: shipped Samsara\'s first edge-AI safety features..."). For each chapter, give us <em>one specific moment</em> - the detail that makes someone go "oh wow." It doesn\'t have to be heroic. The better ones usually aren\'t.</div>'
        + '<div class="question">'
        + '  <div class="q-label">One moment per chapter.</div>'
        + '  <div class="q-hint">'
        + '    <strong>Obama 2012 / early career</strong> - the Dashboard, organizing 358k events, or a first-job-out moment.<br><br>'
        + '    <strong>McKinsey (2016-19)</strong> - the "Distinctive" moment, or the client/project that made you want to operate instead of advise.<br><br>'
        + '    <strong>Samsara (2019-21)</strong> - building the ML teams, the edge-AI safety feature, or the patent story.<br><br>'
        + '    <strong>project44 (2021-23)</strong> - the GM seat, shipping 4 new products, or the moment you decided to leave.<br><br>'
        + '    <strong>Letter (2023-now)</strong> - founding with Armen, the first customer, the Series A/B.'
        + '  </div>'
        + '  <textarea class="x-tall" data-key="q10" placeholder="Obama / early -\nMcKinsey -\nSamsara -\nproject44 -\nLetter -"></textarea>'
        + '</div>';
    }},

    // Submit
    { id: 'submit', label: 'Submit', type: 'submit', render: function () {
      return ''
        + '<div class="section-label">Final step</div>'
        + '<div class="section-title">Thanks for the time, Ali.</div>'
        + '<div class="section-desc">That\'s everything we needed. Hit submit and your content team will pick it up from here. First drafts in your inbox within the week.</div>';
    }},

    // Confirmation
    { id: 'done', label: 'Done', type: 'done', render: function () {
      return ''
        + '<div class="done">'
        + '  <div class="logo-brand" aria-label="Letter AI"><img src="assets/favicon.png" alt="Letter AI"></div>'
        + '  <h2>All set.</h2>'
        + '  <p>Your answers landed. Your content team will follow up with first drafts soon.</p>'
        + '</div>';
    }}
  ];

  // ============================================================
  // Renderer
  // ============================================================
  var current = 0;
  var answers = {};
  var startedSent = false;

  function render() {
    var app = document.getElementById('app');
    app.innerHTML = '<div class="section active">' + sections[current].render() + '</div>';

    // Restore prior answers
    app.querySelectorAll('[data-key]').forEach(function (el) {
      var k = el.dataset.key;
      if (answers[k] === undefined) return;
      if (el.tagName === 'TEXTAREA' || el.tagName === 'INPUT') {
        el.value = answers[k];
      } else if (el.classList.contains('radio-group')) {
        var radios = el.querySelectorAll('input[type="radio"]');
        radios.forEach(function (r) {
          if (r.value === answers[k]) {
            r.checked = true;
            r.closest('.radio-row').classList.add('selected');
          }
        });
      }
    });

    // Wire radios + reveal (supports multiple reveal blocks per group)
    app.querySelectorAll('.radio-group').forEach(function (group) {
      var radios = group.querySelectorAll('input[type="radio"]');
      var reveals = group.parentElement.querySelectorAll('[data-reveal-for]');
      radios.forEach(function (r) {
        r.addEventListener('change', function () {
          group.querySelectorAll('.radio-row').forEach(function (row) { row.classList.remove('selected'); });
          r.closest('.radio-row').classList.add('selected');
          reveals.forEach(function (revealHost) {
            var trigger = revealHost.dataset.revealFor;
            if (r.value === trigger) revealHost.classList.add('show');
            else revealHost.classList.remove('show');
          });
          saveAll();
        });
      });
      var checked = group.querySelector('input[type="radio"]:checked');
      if (checked) {
        reveals.forEach(function (revealHost) {
          if (checked.value === revealHost.dataset.revealFor) revealHost.classList.add('show');
        });
      }
    });

    // Wire inputs
    app.querySelectorAll('textarea, input[type="text"], input[type="email"]').forEach(function (el) {
      el.addEventListener('input', saveAll);
    });

    updateUI();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function saveAll() {
    var app = document.getElementById('app');
    app.querySelectorAll('[data-key]').forEach(function (el) {
      var k = el.dataset.key;
      if (el.tagName === 'TEXTAREA' || el.tagName === 'INPUT') {
        answers[k] = el.value;
      } else if (el.classList.contains('radio-group')) {
        var checked = el.querySelector('input[type="radio"]:checked');
        answers[k] = checked ? checked.value : '';
      }
    });
  }

  function updateUI() {
    var totalSteps = sections.length - 2;
    var pct;
    if (current === 0) pct = 0;
    else if (current >= sections.length - 1) pct = 100;
    else pct = Math.round((current / totalSteps) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressPct').textContent = pct + '%';
    document.getElementById('sectionLabel').textContent = sections[current].label;

    var back = document.getElementById('btnBack');
    var next = document.getElementById('btnNext');
    var navBar = document.querySelector('.nav-bar');

    next.style.display = '';
    back.style.display = '';
    navBar.style.display = '';

    back.style.visibility = current === 0 ? 'hidden' : 'visible';

    var s = sections[current];
    if (s.type === 'welcome') {
      next.textContent = 'Get Started';
      next.className = 'btn btn-primary';
    } else if (s.type === 'submit') {
      next.textContent = 'Submit';
      next.className = 'btn btn-submit';
    } else if (s.type === 'done') {
      navBar.style.display = 'none';
    } else {
      next.textContent = 'Continue';
      next.className = 'btn btn-primary';
    }
  }

  function goNext() {
    saveAll();
    var s = sections[current];

    if (s.type === 'welcome') {
      if (!startedSent) {
        sendEvent('Started', {});
        startedSent = true;
      }
    } else if (s.type === 'question') {
      var payload = {};
      payload[s.qKey] = answers[s.qKey] || '';
      var otherKey = s.qKey + '_other';
      if (answers[otherKey]) payload[otherKey] = answers[otherKey];
      sendEvent('Q' + s.qNum + ' answered', payload);
    } else if (s.type === 'submit') {
      sendEvent('Submitted', {});
    }

    if (current < sections.length - 1) {
      current++;
      render();
    }
  }

  function goBack() {
    saveAll();
    if (current > 0) { current--; render(); }
  }

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && e.metaKey) goNext();
  });

  render();
</script>
</body>
</html>
