<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RallyUp — Letter AI Content Intake</title>
<style>
  @import url('https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,800,900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --primary: #7f56d9;
    --accent-1: #9e77ed;
    --accent-2: #6941c6;
    --dark: #14101f;
    --card: #1d1730;
    --border: rgba(255,255,255,0.08);
    --gray: #9b93ad;
    --white: #F1F5F9;
    --radius: 14px;
  }
  body {
    font-family: 'Satoshi', -apple-system, sans-serif;
    background: var(--dark);
    color: var(--white);
    min-height: 100vh;
    line-height: 1.6;
  }

  .header {
    padding: 32px 24px 0;
    max-width: 640px;
    margin: 0 auto;
    text-align: center;
  }
  .logo-row {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; margin-bottom: 20px;
  }
  .logo-ru {
    width: 48px; height: 48px;
    background: linear-gradient(180deg, var(--primary), var(--accent-1));
    border-radius: var(--radius);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .logo-ru svg { width: 26px; height: 26px; }
  .logo-x {
    font-size: 16px; color: rgba(255,255,255,0.25); font-weight: 500;
  }
  .logo-brand {
    width: 48px; height: 48px;
    background: white;
    border-radius: var(--radius);
    display: inline-flex; align-items: center; justify-content: center;
    padding: 6px;
  }
  .logo-brand img { max-width: 36px; max-height: 36px; }
  .header h1 { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
  .header p { color: var(--gray); font-size: 15px; max-width: 480px; margin: 0 auto 8px; }
  .time-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(127,86,217,0.12); border: 1px solid rgba(127,86,217,0.3);
    color: var(--accent-1); font-size: 13px; font-weight: 600;
    padding: 6px 16px; border-radius: 50px; margin-top: 12px;
  }

  .progress-wrap { max-width: 640px; margin: 28px auto 0; padding: 0 24px; }
  .progress-bar {
    height: 4px; background: rgba(255,255,255,0.06);
    border-radius: 4px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--primary), var(--accent-1));
    border-radius: 4px; transition: width 0.5s cubic-bezier(0.22,1,0.36,1);
  }
  .progress-label {
    display: flex; justify-content: space-between; margin-top: 8px;
    font-size: 12px; color: var(--gray); font-weight: 500;
  }

  .container { max-width: 640px; margin: 0 auto; padding: 24px 24px 120px; }

  .section { display: none; animation: fadeIn 0.4s ease; }
  .section.active { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .section-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--primary); margin-bottom: 8px;
  }
  .section-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .section-desc { font-size: 14px; color: var(--gray); margin-bottom: 28px; }

  .question { margin-bottom: 28px; }
  .q-label {
    font-size: 15px; font-weight: 600; margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .q-hint { font-size: 13px; color: var(--gray); margin-bottom: 10px; }

  textarea, input[type="text"], input[type="email"] {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px; color: var(--white);
    font-family: inherit; font-size: 15px; resize: vertical;
    transition: border-color 0.2s; outline: none;
  }
  textarea:focus, input[type="text"]:focus, input[type="email"]:focus {
    border-color: rgba(127,86,217,0.55);
  }
  textarea { min-height: 88px; }

  .radio-group { display: flex; flex-direction: column; gap: 8px; }
  .radio-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px 14px; background: var(--card);
    border: 1px solid var(--border); border-radius: 12px;
    cursor: pointer; transition: all 0.2s;
  }
  .radio-row:hover { border-color: rgba(127,86,217,0.45); background: rgba(127,86,217,0.06); }
  .radio-row.selected {
    background: rgba(127,86,217,0.12); border-color: var(--primary);
  }
  .radio-row input[type="radio"] {
    margin-top: 4px; accent-color: var(--primary);
  }
  .radio-row .rl { font-size: 14px; font-weight: 500; }

  .inline-text { margin-top: 10px; display: none; }
  .inline-text.show { display: block; }

  .nav-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(20,16,31,0.92); backdrop-filter: blur(16px);
    border-top: 1px solid var(--border); padding: 16px 24px;
    display: flex; justify-content: space-between; align-items: center;
    max-width: 640px; margin: 0 auto;
    z-index: 100;
  }
  @media(min-width:641px) {
    .nav-bar { left: 50%; transform: translateX(-50%); border-radius: 20px 20px 0 0; }
  }
  .btn {
    padding: 12px 28px; border-radius: 12px; font-size: 15px;
    font-weight: 600; cursor: pointer; border: none;
    font-family: inherit; transition: all 0.2s;
  }
  .btn-ghost { background: transparent; color: var(--gray); }
  .btn-ghost:hover { color: var(--white); }
  .btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--accent-1));
    color: white;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-submit {
    background: linear-gradient(135deg, var(--primary), var(--accent-2));
    color: white;
  }
  .btn:disabled { opacity: 0.4; cursor: default; transform: none; }

  .welcome { text-align: center; padding: 40px 0 0; }
  .welcome h2 { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
  .welcome p { color: var(--gray); font-size: 16px; max-width: 460px; margin: 0 auto 32px; line-height: 1.65; }
  .welcome-cards {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    text-align: left; margin-bottom: 32px;
  }
  .wc {
    padding: 16px; background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .wc h4 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .wc p { font-size: 12px; color: var(--gray); margin: 0; }

  .done { text-align: center; padding: 60px 0; }
  .done .logo-brand {
    width: 64px; height: 64px; margin-bottom: 20px;
    border-radius: var(--radius);
  }
  .done .logo-brand img { max-width: 48px; max-height: 48px; }
  .done h2 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
  .done p { color: var(--gray); font-size: 16px; max-width: 420px; margin: 0 auto; line-height: 1.6; }

  @media(max-width:480px) {
    .welcome-cards { grid-template-columns: 1fr; }
    .header h1 { font-size: 22px; }
    .section-title { font-size: 20px; }
  }
</style>
</head>
<body>

<!-- Token gate runs FIRST, before any UI renders. Invalid token = entire body replaced. -->
<script>
  (function () {
    var REQUIRED_TOKEN = '29fd2500';
    var urlParams = new URLSearchParams(window.location.search);
    var providedToken = urlParams.get('key');
    // Local preview (opening the file directly) bypasses the gate so the form
    // can be reviewed without the token. On the deployed https link the token
    // is still required.
    var isLocalPreview = (window.location.protocol === 'file:');
    if (!isLocalPreview && providedToken !== REQUIRED_TOKEN) {
      document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#888;font-family:system-ui,sans-serif;">This link is invalid or has expired. Please contact your RallyUp partner.</div>';
      throw new Error('invalid_token');
    }
  })();
</script>

<div class="header">
  <div class="logo-row">
    <div class="logo-ru">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/></svg>
    </div>
    <span class="logo-x">x</span>
    <div class="logo-brand">
      <img src="assets/letter-ai-logo.svg" alt="Letter AI">
    </div>
  </div>
  <h1>Executive Content Intake</h1>
  <p>A few quick questions so we can write content that actually sounds like you.</p>
  <div class="time-badge">Takes about 7 minutes</div>
</div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label">
    <span id="sectionLabel">Welcome</span>
    <span id="progressPct">0%</span>
  </div>
</div>

<div class="container" id="app"></div>

<div class="nav-bar">
  <button class="btn btn-ghost" id="btnBack" onclick="goBack()">Back</button>
  <button class="btn btn-primary" id="btnNext" onclick="goNext()">Get Started</button>
</div>

<script>
  // ============================================================
  // Session + Apps Script wiring
  // ============================================================
  var SESSION_ID = (Date.now().toString(36) + Math.random().toString(36).substr(2, 9));
  var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwXZa4DxBSRhMkYmGG6ohRi-IAAdMM1VFXmQ-r--OFGpLh-wuzr7mVHrjNZ7WYrIoMwjA/exec';
  var state = {};

  function sendEvent(event, fields) {
    Object.assign(state, fields || {});
    state.event = event;
    state.session_id = SESSION_ID;
    state.timestamp = new Date().toISOString();
    try {
      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(state),
        redirect: 'follow'
      });
    } catch (e) { /* network noise — swallow */ }
  }

  // ============================================================
  // Sections
  // ============================================================
  var sections = [
    // 0: Welcome
    { id: 'welcome', label: 'Welcome', type: 'welcome', render: function () {
      return ''
        + '<div class="welcome">'
        + '  <h2>Hey Ali</h2>'
        + '  <p>We have already mapped a lot from your posts, your profile, and Letter AI\'s brand. This form fills the gaps that posts alone cannot tell us — your origin, your frameworks, the credentials you would actually surface. Answer quickly and honestly, no need to overthink.</p>'
        + '  <div class="welcome-cards">'
        + '    <div class="wc"><h4>9 short questions</h4><p>Mostly tap to answer</p></div>'
        + '    <div class="wc"><h4>About 7 minutes</h4><p>Built for busy founders</p></div>'
        + '    <div class="wc"><h4>No wrong answers</h4><p>Your real perspective is what we need</p></div>'
        + '    <div class="wc"><h4>Stays between us</h4><p>Only shared with your content team</p></div>'
        + '  </div>'
        + '</div>';
    }},

    // 1: Origin Story — THIN — Deepening (textarea)
    { id: 'q1', label: 'Origin Story', type: 'question', qNum: 1, qKey: 'q1', render: function () {
      return ''
        + '<div class="section-label">Section 1 of 9</div>'
        + '<div class="section-title">Why you built Letter</div>'
        + '<div class="section-desc">Your origin story is the foundation of the founder-in-public track we want to build for you. It is the one thing your posts cannot tell us.</div>'
        + '<div class="question">'
        + '  <div class="q-label">Walk me through the specific moment at Samsara or project44 when you realized legacy enablement was broken enough that you had to leave and build Letter. Who was the seller pinging an engineer? What was the question they could not answer? What did you do that day?</div>'
        + '  <textarea data-key="q1" placeholder="Start anywhere — the room, the person, what they said. First pass, do not polish."></textarea>'
        + '</div>';
    }},

    // 2: Unnamed Frameworks — MISSING — Discovery (textarea)
    { id: 'q2', label: 'Frameworks', type: 'question', qNum: 2, qKey: 'q2', render: function () {
      return ''
        + '<div class="section-label">Section 2 of 9</div>'
        + '<div class="section-title">Your one-line test</div>'
        + '<div class="section-desc">A named framework with your name on it is what gets reshared. Today you borrow "make something people want" (YC) and "never sell alone" (brand vision), but you do not have one that is yours.</div>'
        + '<div class="question">'
        + '  <div class="q-label">What is the one question you ask most often when you evaluate a new Letter feature or roadmap call? If you had to name that test — the way Bezos has "Day 1" — what would you call it, and what are its 2-3 inputs?</div>'
        + '  <textarea data-key="q2" placeholder="e.g., Does this make the seller look smart in front of the buyer? I call it the ___ test, and it comes down to ___."></textarea>'
        + '</div>';
    }},

    // 3: Underused Content Assets — MISSING — Deepening (textarea, pick + lesson)
    { id: 'q3', label: 'Underused Credentials', type: 'question', qNum: 3, qKey: 'q3', render: function () {
      return ''
        + '<div class="section-label">Section 3 of 9</div>'
        + '<div class="section-title">The credential you would actually surface</div>'
        + '<div class="section-desc">Four of your credentials never show up in your posts, and each one counters the 2026 buyer skepticism ("is this just a GPT wrapper?") with a real-world track record.</div>'
        + '<div class="question">'
        + '  <div class="q-label">Pick the ONE you would be comfortable building a post around next quarter, and tell me the lesson you would hang on it:<br><br>a) Samsara edge-AI / your safety patent &nbsp;&middot;&nbsp; b) McKinsey "Distinctive" (top 5%) &nbsp;&middot;&nbsp; c) Obama 2012 Dashboard (358k events) &nbsp;&middot;&nbsp; d) Chicago roots — Northside Prep to full-tuition U Chicago</div>'
        + '  <textarea data-key="q3" placeholder="e.g., (a) Samsara — the lesson is that real-world AI has to earn trust before it earns adoption..."></textarea>'
        + '</div>';
    }},

    // 4: Personal Disclosure / Mode F — THIN — Discovery (radio + Other)
    { id: 'q4', label: 'Founder-in-Public', type: 'question', qNum: 4, qKey: 'q4', render: function () {
      return ''
        + '<div class="section-label">Section 4 of 9</div>'
        + '<div class="section-title">How personal you will go</div>'
        + '<div class="section-desc">Your highest-performing post ever (373 reactions) was the "two little monsters" personal note. The personal track clearly works for your audience, but it has only happened once.</div>'
        + '<div class="question">'
        + '  <div class="q-label">Which personal anchor are you most comfortable leaning into for 1-2 posts a year?</div>'
        + '  <div class="radio-group" data-key="q4">'
        + '    <label class="radio-row"><input type="radio" name="q4" value="Parenting / family"><span class="rl">Parenting / family / Slack-DND time</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q4" value="Chicago / first-gen"><span class="rl">Chicago / Northside Prep / first-gen-college story</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q4" value="Career pivot"><span class="rl">A post-McKinsey burnout or career-pivot moment</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q4" value="Leaving project44"><span class="rl">The day I decided to leave project44</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q4" value="Something else"><span class="rl">Something else</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q4" value="None"><span class="rl">None — keep it customer-first only</span></label>'
        + '  </div>'
        + '  <div class="inline-text" data-reveal-for="Something else">'
        + '    <textarea data-key="q4_changed" placeholder="What personal anchor would you use?"></textarea>'
        + '  </div>'
        + '</div>';
    }},

    // 5: Content Series — MISSING — Discovery (radio)
    { id: 'q5', label: 'Content Series', type: 'question', qNum: 5, qKey: 'q5', render: function () {
      return ''
        + '<div class="section-label">Section 5 of 9</div>'
        + '<div class="section-title">A series you would commit to</div>'
        + '<div class="section-desc">Series compound — each entry references the last. Right now every post stands alone. Two natural candidates already have a seed in your corpus.</div>'
        + '<div class="question">'
        + '  <div class="q-label">Would you commit to one recurring series? Pick what feels sustainable:</div>'
        + '  <div class="radio-group" data-key="q5">'
        + '    <label class="radio-row"><input type="radio" name="q5" value="From the Field"><span class="rl">"From the Field" — customer on-sites (Lenovo Morrisville was the seed)</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q5" value="Year of Building"><span class="rl">"Year of Building" — quarterly milestone roundups</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q5" value="Both"><span class="rl">Both</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q5" value="Neither"><span class="rl">Neither right now</span></label>'
        + '  </div>'
        + '</div>';
    }},

    // 6: Thought Leaders & Influences — MISSING — Discovery (textarea)
    { id: 'q6', label: 'Thought Leaders', type: 'question', qNum: 6, qKey: 'q6', render: function () {
      return ''
        + '<div class="section-label">Section 6 of 9</div>'
        + '<div class="section-title">Who you actually read</div>'
        + '<div class="section-desc">Knowing whose voices you respect tells us your positioning aspirations, and surfaces collaboration and reshare opportunities.</div>'
        + '<div class="question">'
        + '  <div class="q-label">Name 3-5 founders, operators, or category voices on LinkedIn whose posts you actually read end to end. Why those people specifically?</div>'
        + '  <textarea data-key="q6" placeholder="e.g., Mark Roberge for GTM math, ___ for ___ — because ___."></textarea>'
        + '</div>';
    }},

    // 7: Cross-Platform Presence — MISSING — Discovery (radio + Other)
    { id: 'q7', label: 'Cross-Platform', type: 'question', qNum: 7, qKey: 'q7', render: function () {
      return ''
        + '<div class="section-label">Section 7 of 9</div>'
        + '<div class="section-title">Beyond LinkedIn</div>'
        + '<div class="section-desc">Right now 100% of your owned voice is LinkedIn at roughly one post every 3-4 weeks. A second channel would extend your reach outside LinkedIn\'s distribution.</div>'
        + '<div class="question">'
        + '  <div class="q-label">Is there another channel you are considering?</div>'
        + '  <div class="radio-group" data-key="q7">'
        + '    <label class="radio-row"><input type="radio" name="q7" value="Substack / newsletter"><span class="rl">Substack / newsletter</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q7" value="X / Twitter"><span class="rl">X / Twitter</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q7" value="Podcast guesting"><span class="rl">Podcast guesting (incl. YC alumni)</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q7" value="YouTube"><span class="rl">YouTube</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q7" value="None"><span class="rl">None — keep it LinkedIn-only</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q7" value="Other"><span class="rl">Other</span></label>'
        + '  </div>'
        + '  <div class="inline-text" data-reveal-for="Other">'
        + '    <textarea data-key="q7_changed" placeholder="Which channel, and how close is it to launching?"></textarea>'
        + '  </div>'
        + '</div>';
    }},

    // 8: Posting Cadence — REQUIRES CONFIRMATION — Validation (radio)
    { id: 'q8', label: 'Posting Cadence', type: 'question', qNum: 8, qKey: 'q8', render: function () {
      return ''
        + '<div class="section-label">Section 8 of 9</div>'
        + '<div class="section-title">Your cadence</div>'
        + '<div class="section-desc">This tells us whether to calibrate to low-volume / high-signal, or to serve you more drafts.</div>'
        + '<div class="question">'
        + '  <div class="q-label">You are posting roughly once every 3-4 weeks. Is that intentional, or would you post more if drafts were ready?</div>'
        + '  <div class="radio-group" data-key="q8">'
        + '    <label class="radio-row"><input type="radio" name="q8" value="Intentional"><span class="rl">Intentional — keep it low-volume / high-signal</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q8" value="Would post more"><span class="rl">I would post ~2x/month if drafts were ready to review</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q8" value="Not sure"><span class="rl">Not sure</span></label>'
        + '  </div>'
        + '</div>';
    }},

    // 9: "Never sell alone" Brand Vision — REQUIRES CONFIRMATION — Validation (radio + Changed)
    { id: 'q9', label: 'Brand Vision', type: 'question', qNum: 9, qKey: 'q9', render: function () {
      return ''
        + '<div class="section-label">Section 9 of 9</div>'
        + '<div class="section-title">"Never sell alone"</div>'
        + '<div class="section-desc">This is documented as Letter\'s brand vision phrase, but it has not appeared in your posts. If it is still active, it becomes a signature line for your thesis posts.</div>'
        + '<div class="question">'
        + '  <div class="q-label">Is "Never sell alone" still the active brand line you use internally and externally, or has it shifted?</div>'
        + '  <div class="radio-group" data-key="q9">'
        + '    <label class="radio-row"><input type="radio" name="q9" value="Still active"><span class="rl">Still active</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q9" value="Changed"><span class="rl">Changed — describe</span></label>'
        + '    <label class="radio-row"><input type="radio" name="q9" value="Not sure"><span class="rl">Not sure</span></label>'
        + '  </div>'
        + '  <div class="inline-text" data-reveal-for="Changed">'
        + '    <textarea data-key="q9_changed" placeholder="What is the current line?"></textarea>'
        + '  </div>'
        + '</div>';
    }},

    // Email capture
    { id: 'email', label: 'Email', type: 'email', render: function () {
      return ''
        + '<div class="section-label">Final step</div>'
        + '<div class="section-title">Where should we reach you?</div>'
        + '<div class="section-desc">We will share back what we learned and confirm next steps.</div>'
        + '<div class="question">'
        + '  <div class="q-label">Your email</div>'
        + '  <input type="email" data-key="email" placeholder="you@letter.ai" required>'
        + '</div>';
    }},

    // Thank-you
    { id: 'done', label: 'Done', type: 'done', render: function () {
      return ''
        + '<div class="done">'
        + '  <div class="logo-brand"><img src="assets/letter-ai-logo.svg" alt="Letter AI"></div>'
        + '  <h2>That is it. Thanks, Ali.</h2>'
        + '  <p>We have what we need to start writing in your voice. You can close this tab.</p>'
        + '</div>';
    }}
  ];

  // ============================================================
  // Renderer
  // ============================================================
  var current = 0;
  var answers = {};
  var startedSent = false;

  function render() {
    var app = document.getElementById('app');
    app.innerHTML = '<div class="section active">' + sections[current].render() + '</div>';

    app.querySelectorAll('[data-key]').forEach(function (el) {
      var k = el.dataset.key;
      if (answers[k] === undefined) return;
      if (el.tagName === 'TEXTAREA' || el.tagName === 'INPUT') {
        el.value = answers[k];
      } else if (el.classList.contains('radio-group')) {
        var radios = el.querySelectorAll('input[type="radio"]');
        radios.forEach(function (r) {
          if (r.value === answers[k]) {
            r.checked = true;
            r.closest('.radio-row').classList.add('selected');
          }
        });
      }
    });

    app.querySelectorAll('.radio-group').forEach(function (group) {
      var radios = group.querySelectorAll('input[type="radio"]');
      radios.forEach(function (r) {
        r.addEventListener('change', function () {
          group.querySelectorAll('.radio-row').forEach(function (row) { row.classList.remove('selected'); });
          r.closest('.radio-row').classList.add('selected');
          var revealHost = group.parentElement.querySelector('[data-reveal-for]');
          if (revealHost) {
            var trigger = revealHost.dataset.revealFor;
            if (r.value === trigger) revealHost.classList.add('show');
            else revealHost.classList.remove('show');
          }
          saveAll();
        });
      });
    });

    app.querySelectorAll('textarea, input[type="text"], input[type="email"]').forEach(function (el) {
      el.addEventListener('input', saveAll);
    });

    updateUI();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function saveAll() {
    var app = document.getElementById('app');
    app.querySelectorAll('[data-key]').forEach(function (el) {
      var k = el.dataset.key;
      if (el.tagName === 'TEXTAREA' || el.tagName === 'INPUT') {
        answers[k] = el.value;
      } else if (el.classList.contains('radio-group')) {
        var checked = el.querySelector('input[type="radio"]:checked');
        answers[k] = checked ? checked.value : '';
      }
    });
  }

  function updateUI() {
    var totalSteps = sections.length - 2;
    var pct;
    if (current === 0) pct = 0;
    else if (current >= sections.length - 1) pct = 100;
    else pct = Math.round((current / totalSteps) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressPct').textContent = pct + '%';
    document.getElementById('sectionLabel').textContent = sections[current].label;

    var back = document.getElementById('btnBack');
    var next = document.getElementById('btnNext');
    var navBar = document.querySelector('.nav-bar');

    next.style.display = '';
    back.style.display = '';
    navBar.style.display = '';

    back.style.visibility = current === 0 ? 'hidden' : 'visible';

    var s = sections[current];
    if (s.type === 'welcome') {
      next.textContent = 'Get Started';
      next.className = 'btn btn-primary';
    } else if (s.type === 'email') {
      next.textContent = 'Submit';
      next.className = 'btn btn-submit';
    } else if (s.type === 'done') {
      navBar.style.display = 'none';
    } else {
      next.textContent = 'Continue';
      next.className = 'btn btn-primary';
    }
  }

  function goNext() {
    saveAll();
    var s = sections[current];

    if (s.type === 'welcome') {
      if (!startedSent) {
        sendEvent('Started', {});
        startedSent = true;
      }
    } else if (s.type === 'question') {
      var payload = {};
      payload[s.qKey] = answers[s.qKey] || '';
      var changedKey = s.qKey + '_changed';
      if (answers[changedKey]) payload[changedKey] = answers[changedKey];
      sendEvent('Q' + s.qNum + ' answered', payload);
    } else if (s.type === 'email') {
      var email = answers.email || '';
      if (!email || email.indexOf('@') === -1) {
        alert('Please enter a valid email so we can reach you.');
        return;
      }
      sendEvent('Submitted', { email: email });
    }

    if (current < sections.length - 1) {
      current++;
      render();
    }
  }

  function goBack() {
    saveAll();
    if (current > 0) { current--; render(); }
  }

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && e.metaKey) goNext();
  });

  render();
</script>
</body>
</html>
